<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Products</title>
</head>
<body>
<h1>Products</h1>
<ul>
    <li th:each="product : ${products}">
        <img th:src="${product.image}" width="100" />
        <p th:text="${product.title}"></p>
        <p th:text="${product.price}"></p>

    </li>
</ul>
</body>
</html>
