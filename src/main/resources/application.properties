spring.application.name=MolnbaseradJavaapplikation

spring.datasource.url=jdbc:mysql://localhost:3306/cloudstore?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=<din_mysql_user>
spring.datasource.password=<ditt_mysql_password>

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=none

spring.flyway.enabled=true
spring.flyway.locations=classpath:migrations
spring.flyway.baseline-on-migrate=true

