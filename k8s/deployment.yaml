apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-product-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: java-product-service
  template:
    metadata:
      labels:
        app: java-product-service
    spec:
      containers:
        - name: java-product-service
          image: java-product-service:v1
          ports:
            - containerPort: 8080